#
name: Create and publish Docker images

# Configures this workflow to run every time a change is pushed to the branch called `release`.
on:
  push:
    branches:
      - 'develop/*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: qalipsis/base

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract current version
        run: |
          echo "PROJECT_VERSION=$(awk -F, '/,/{gsub(/ /, "", $0); print} ' project.version)" >> "$GITHUB_ENV"

      - name: Extract metadata for Docker base image
        id: metabase
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}
          tags: |
            type=raw,value=${{ env.PROJECT_VERSION }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=snapshot,enable=${{ github.ref != format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker base image
        id: pushbase
        uses: docker/build-push-action@v6
        with:
          context: docker/base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metabase.outputs.tags }}
          labels: ${{ steps.metabase.outputs.labels }}
          annotations: ${{ steps.metabase.outputs.annotations }}
          build-args: |
            JAVA_VERSION=21

      # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see [Using artifact attestations to establish provenance for builds](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds).
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE}}
          subject-digest: ${{ steps.pushbase.outputs.digest }}
          push-to-registry: true
