datasource:
  host: localhost
  port: 5432
  database: qalipsis
  schema: qalipsis
  username: qalipsis
  password: qalipsis
  pool:
    min: 4
    max: 20
    maxLifeTime: PT10M
    maxIdleTime: PT4M
    maxAcquireTime: PT5S

datasources:
  default: # Required only for Liquibase and campaign meter writes.
    url: jdbc:postgresql://${datasource.host}:${datasource.port}/${datasource.database}?ApplicationName=qalipsis_jdbc&currentSchema=${datasource.schema}
    username: ${datasource.username}
    password: ${datasource.password}
    maximum-pool-size: 4

r2dbc:
  datasources:
    default:
      url: r2dbc:postgresql://${datasource.host}:${datasource.port}/${datasource.database}?ApplicationName=qalipsis_r2dbc
      username: ${datasource.username}
      password: ${datasource.password}
      schema-generate: none
      options:
        driver: pool
        protocol: postgres
        maxSize: ${datasource.pool.max}
        initialSize: ${datasource.pool.min}
        maxLifeTime: ${datasource.pool.maxLifeTime}
        maxIdleTime: ${datasource.pool.maxIdleTime}
        maxAcquireTime: ${datasource.pool.maxAcquireTime}
        poolName: r2dbc
        registerJmx: false
        validationQuery: select 1
        schema: ${datasource.schema}

liquibase:
  enabled: true
  datasources:
    default:
      change-log: 'db/liquibase-changelog.xml'
      liquibase-schema: qalipsis_liquibase
