<style>
    .imageblock img[src$=".svg"] {
        cursor: zoom-in;
        transition: box-shadow 0.2s;
        border-radius: 4px;
    }

    .imageblock img[src$=".svg"]:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }

    #svg-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        cursor: zoom-out;
        overflow: auto;
        padding: 20px;
    }

    #svg-overlay img {
        display: block;
        margin: 0 auto;
        max-width: none;
        background: white;
        border-radius: 6px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    #svg-overlay-close {
        position: fixed;
        top: 16px;
        right: 24px;
        color: white;
        font-size: 32px;
        font-weight: bold;
        cursor: pointer;
        z-index: 10000;
        line-height: 1;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }

    #svg-overlay-hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        z-index: 10000;
    }
</style>

<div id="svg-overlay" onclick="closeSvgOverlay()">
    <span id="svg-overlay-close" onclick="closeSvgOverlay()">&times;</span>
    <img id="svg-overlay-img" src="" alt="">
    <div id="svg-overlay-hint">Click anywhere to close &middot; Scroll to pan</div>
</div>

<script>
    (function () {
        var overlay = document.getElementById('svg-overlay');
        var overlayImg = document.getElementById('svg-overlay-img');

        document.querySelectorAll('.imageblock img[src$=".svg"]').forEach(function (img) {
            img.addEventListener('click', function (e) {
                e.preventDefault();
                overlayImg.src = this.src;
                overlay.style.display = 'block';
                document.body.style.overflow = 'hidden';
            });
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeSvgOverlay();
        });
    })();

    function closeSvgOverlay() {
        document.getElementById('svg-overlay').style.display = 'none';
        document.body.style.overflow = '';
    }
</script>
